<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | HydroLearn</title>

<link rel="stylesheet" href="../assets/css/login.css">

</head>
<body>

<div class="auth-container">

<div class="auth-card">

    <h1>Welcome Back</h1>

    <p>Login to HydroLearn</p>

    <input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
    Login
</button>

    <p>
        Don't have an account?
        <a href="register.html">
            Register
        </a>
    </p>

</div>

</div>
<script type="module" src="../assets/js/login.js"></script>
</body>
</html>
